; PlatformIO Configuration for CubeSat HIL Firmware
; Target: ESP32 (commonly used for CubeSat prototyping)

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_FREERTOS_HZ=1000
lib_deps =
    ; No external libs needed - using Arduino + FreeRTOS built-in

[env:native]
platform = native
build_flags =
    -DUNIT_TEST
    -std=c++11
test_build_src = yes
